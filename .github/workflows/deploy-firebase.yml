name: Deploy firebase-next example to Firebase Hosting
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  pull-requests: write

concurrency:
  group: "firebase-hosting"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./examples/firebase-next
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyBXH5WEqyTxqe-TuT4Adshd2X_yDAk_6qg
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: palimp-308d3.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: palimp-308d3
      NEXT_PUBLIC_FIREBASE_APP_ID: 1:837678669230:web:d0ada499bf5362cf98fc3f
      NEXT_PUBLIC_GITHUB_OWNER: AlfonzAlfonz
      NEXT_PUBLIC_GITHUB_REPO: palimp
      NEXT_PUBLIC_GITHUB_WORKFLOW: deploy-firebase.yml

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - run: pnpm install
      - run: pnpm build
        working-directory: .
      - run: pnpm build
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22.22"
      - run: node -v
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: palimp-308d3
          entryPoint: ./examples/firebase-next
          channelId: live
